<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mundial 2026 · Llaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,500..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#04100B; --bg-mid:#0A2318;
    --gold:#F5C542; --gold-soft:#FFE9A0; --gold-dim:#8A6D1F;
    --line-idle:#254534; --txt:#E8F2EA; --txt-dim:#6E8A79; --dead:#3A4A41;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:radial-gradient(120% 90% at 50% 35%, var(--bg-mid) 0%, var(--bg-deep) 70%);
    color:var(--txt);font-family:'Archivo',system-ui,sans-serif;font-stretch:125%;
    display:flex;flex-direction:column;user-select:none;
  }

  header{text-align:center;padding:calc(10px + env(safe-area-inset-top)) 12px 4px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;gap:12px}
  header h1{font-size:clamp(14px,4vw,20px);font-weight:800;letter-spacing:.26em;color:var(--gold);
    text-shadow:0 0 18px rgba(245,197,66,.45)}
  #zoombtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--gold-dim);
    background:rgba(245,197,66,.06);color:var(--gold);font-size:15px;cursor:pointer}

  /* ---------- viewport con scroll ---------- */
  #viewport{flex:1 1 auto;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch}
  #wrap{position:relative}
  #board{position:absolute;left:0;top:0;transform-origin:0 0}
  #wires{position:absolute;inset:0}
  .wire{fill:none;stroke:var(--line-idle);stroke-width:2;stroke-linejoin:miter;
    transition:stroke .8s,filter .8s,opacity .8s}
  .wire.lit{stroke:var(--gold);filter:drop-shadow(0 0 5px rgba(245,197,66,.8));
    animation:wirePulse 2.6s ease-in-out infinite}
  .wire.dead{opacity:.3}
  @keyframes wirePulse{0%,100%{stroke-opacity:1}50%{stroke-opacity:.55}}

  /* trofeo FIFA */
  #trophy{position:absolute;
    filter:drop-shadow(0 0 22px rgba(245,197,66,.55)) drop-shadow(0 0 60px rgba(245,197,66,.25));
    animation:breathe 4.5s ease-in-out infinite;transition:filter 1s}
  #trophy.crowned{filter:drop-shadow(0 0 34px rgba(255,233,160,.95)) drop-shadow(0 0 90px rgba(245,197,66,.6))}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  #finlabel{position:absolute;font-family:'IBM Plex Mono',monospace;font-size:10px;
    letter-spacing:.3em;color:var(--txt-dim);text-transform:uppercase;text-align:center;transform:translateX(-50%)}

  /* nodos */
  .node{position:absolute;left:0;top:0;width:var(--nd);height:var(--nd);
    margin-left:calc(var(--nd)/-2);margin-top:calc(var(--nd)/-2);
    border-radius:50%;background:#0E2B1E;border:2px solid var(--gold-dim);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 2px rgba(0,0,0,.55);
    transition:transform 1.1s cubic-bezier(.22,.9,.3,1.05),filter .9s,opacity .9s,box-shadow .9s,border-color .9s;
    z-index:3}
  .node .flag{font-size:calc(var(--nd)*.6);line-height:1;pointer-events:none}
  .node .tag{position:absolute;left:50%;top:calc(100% + 2px);transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;
    color:var(--txt-dim);text-shadow:0 1px 2px #000;pointer-events:none}
  .node.alive{border-color:var(--gold);box-shadow:0 0 0 2px rgba(0,0,0,.55),0 0 14px rgba(245,197,66,.55)}
  .node.alive .tag{color:var(--gold-soft)}
  .node.out{filter:grayscale(1) brightness(.5);opacity:.4;border-color:var(--dead);z-index:2}
  .node.champ{border-color:var(--gold-soft);animation:champGlow 2.4s ease-in-out infinite;z-index:4}
  @keyframes champGlow{0%,100%{box-shadow:0 0 0 3px rgba(0,0,0,.6),0 0 26px rgba(255,233,160,.95)}
    50%{box-shadow:0 0 0 3px rgba(0,0,0,.6),0 0 46px rgba(255,233,160,1),0 0 100px rgba(245,197,66,.7)}}

  /* ---------- panel inferior ---------- */
  #panel{flex:0 0 auto;padding:6px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent, rgba(2,10,6,.94) 30%)}
  #dayline{display:flex;align-items:center;gap:10px;justify-content:center}
  .navbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--gold-dim);
    background:rgba(245,197,66,.06);color:var(--gold);font-size:17px;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s}
  .navbtn:active{transform:scale(.92);background:rgba(245,197,66,.18)}
  .navbtn:disabled{opacity:.28}
  #playbtn{width:52px;height:52px;font-size:20px;border-width:2px;border-color:var(--gold)}
  #daylabel{text-align:center;min-width:150px;font-family:'IBM Plex Mono',monospace}
  #daylabel .fecha{font-size:14px;font-weight:500;color:var(--gold-soft);letter-spacing:.12em;text-transform:uppercase}
  #daylabel .ronda{font-size:9.5px;color:var(--txt-dim);letter-spacing:.24em;margin-top:2px;text-transform:uppercase}
  #matches{margin-top:8px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
    scrollbar-width:none;justify-content:safe center}
  #matches::-webkit-scrollbar{display:none}
  .mcard{flex:0 0 auto;display:flex;align-items:center;gap:7px;border:1px solid var(--line-idle);
    border-radius:12px;padding:7px 11px;background:rgba(10,35,24,.55);
    font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:nowrap;animation:cardIn .5s ease both}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .mcard .mf{font-size:17px;line-height:1}
  .mcard .sc{color:var(--gold);font-weight:500;letter-spacing:.05em;padding:0 2px}
  .mcard .pn{font-size:9px;color:var(--txt-dim);margin-left:2px}
  .mcard .loser{filter:grayscale(1) brightness(.6)}
  .mcard.pending{border-style:dashed;color:var(--txt-dim)}
  .mcard.pending .sc{color:var(--txt-dim)}
</style>
</head>

  {slots:2, name:'Gran Final'},
];
const ROWH=52, COLW=96, CENTERW=170, PADX=34, PADY=30;
const H = PADY*2 + 16*ROWH;
const W = PADX*2 + COLW*4*2 + CENTERW;
const CX=W/2, CY=H/2;

/* Posición de un cupo: ronda r (0..4), índice global i */
function slotPos(r,i){
  const count=ROUNDS[r].slots, half=count/2;
  const left = i < half;
  const li = left ? i : i-half;                    // índice dentro del lado
  const teamsPerSide = 16/Math.pow(2,r);           // filas que abarca
  const span = 16/teamsPerSide;                    // filas por cupo
  const y = PADY + (li*span + span/2)*ROWH;
  const x = left ? PADX + r*COLW : W - PADX - r*COLW;
  return [x,y,left];
}

const viewport=document.getElementById('viewport');
const wrap=document.getElementById('wrap');
const board=document.getElementById('board');
const wires=document.getElementById('wires');
const trophy=document.getElementById('trophy');

const match=(r,i)=>RESULTADOS.find(m=>m.r===r&&m.i===i);
const winnerOf=m=>{
  if(!m||!m.score) return null;
  const [a,b]=m.score;
  if(a!==b) return a>b?m.a:m.b;
  if(m.pens) return m.pens[0]>m.pens[1]?m.a:m.b;
  return null;
};
function teamsOf(m){
  if(m.a&&m.b) return [m.a,m.b];
  const p1=match(m.r-1,m.i*2), p2=match(m.r-1,m.i*2+1);
  return [p1?winnerOf(p1):null, p2?winnerOf(p2):null];
}
function flagEmoji(code){
  if(code==='gb-eng') return '🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  return code.toUpperCase().replace(/./g,ch=>String.fromCodePoint(127397+ch.charCodeAt(0)));
}

const DAYS=[...new Set(RESULTADOS.map(m=>m.d))].sort();
let dayIdx=0;
let lastPlayed=(()=>{let k=0;RESULTADOS.forEach(m=>{if(m.score)k=Math.max(k,DAYS.indexOf(m.d));});return k;})();

/* ---------- construcción ---------- */
board.style.width=W+'px'; board.style.height=H+'px';
wires.setAttribute('viewBox',`0 0 ${W} ${H}`);
wires.style.width=W+'px'; wires.style.height=H+'px';

const TRH=170, TRW=Math.round(TRH*305/735); // trofeo real (recorte)
trophy.style.height=TRH+'px';
trophy.style.left=(CX-TRW/2)+'px';
trophy.style.top=(CY-TRH*0.56)+'px';
const TR=TRW; // ancho de referencia para los cables
const finlabel=document.getElementById('finlabel');
finlabel.style.left=CX+'px'; finlabel.style.top=(CY+TRH*0.5+8)+'px';

const nodes={};
BRACKET.forEach((code,i)=>{
  const el=document.createElement('div');
  el.className='node';
  el.innerHTML=`<span class="flag">${flagEmoji(T[code].f)}</span><span class="tag">${code}</span>`;
  board.appendChild(el);
  nodes[code]={el,base:i};
});
document.documentElement.style.setProperty('--nd','34px');

/* Cables rectos en escuadra: hijo → codo → padre */
const wireEls={};
(function buildWires(){
  for(let r=0;r<4;r++){
    for(let i=0;i<ROUNDS[r].slots;i++){
      const [x1,y1,left]=slotPos(r,i);
      const [x2,y2]=slotPos(r+1,Math.floor(i/2));
      const midX = left ? x1+COLW/2 : x1-COLW/2;
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',`M ${x1} ${y1} H ${midX} V ${y2} H ${x2}`);
      p.setAttribute('class','wire');
      wires.appendChild(p);
      wireEls[`${r}-${i}`]=p;
    }
  }
  // finalistas → trofeo
  for(let i=0;i<2;i++){
    const [x1,y1,left]=slotPos(4,i);
    const tx = left ? CX-TR/2-14 : CX+TR/2+14;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${x1} ${y1} H ${(x1+tx)/2} V ${CY} H ${tx}`);
    p.setAttribute('class','wire');
    wires.appendChild(p);
    wireEls[`4-${i}`]=p;
  }
})();

/* ---------- render de un día ---------- */
function render(){
  const today=DAYS[dayIdx];
  const prog={}; BRACKET.forEach(c=>prog[c]={round:0,out:false});
  Object.values(wireEls).forEach(w=>w.classList.remove('lit','dead'));
  let champion=null;

  const slotIndexOf=(code,r)=>Math.floor(nodes[code].base/Math.pow(2,r));

  RESULTADOS.forEach(m=>{
    if(m.d>today||!m.score) return;
    const w=winnerOf(m); if(!w) return;
    const [a,b]=teamsOf(m); const l=(w===a)?b:a;
    if(l) prog[l].out=true;
    if(m.r<4) prog[w].round=Math.max(prog[w].round,m.r+1);
    else champion=w;
    wireEls[`${m.r}-${slotIndexOf(w,m.r)}`]?.classList.add('lit');
    if(l) wireEls[`${m.r}-${slotIndexOf(l,m.r)}`]?.classList.add('dead');
  });

  BRACKET.forEach(code=>{
    const p=prog[code], n=nodes[code];
    const r=Math.min(p.round,4);
    let [x,y]=slotPos(r,Math.floor(n.base/Math.pow(2,r)));
    if(code===champion){ x=CX; y=CY-TRH*0.56-26; }
    n.el.style.transform=`translate(${x}px,${y}px)`;
    n.el.classList.toggle('out',p.out);
    n.el.classList.toggle('alive',!p.out&&p.round>0&&code!==champion);
    n.el.classList.toggle('champ',code===champion);
  });
  trophy.classList.toggle('crowned',!!champion);

  const dt=new Date(today+'T12:00:00');
  const roundsToday=[...new Set(RESULTADOS.filter(m=>m.d===today).map(m=>ROUNDS[m.r].name))];
  document.querySelector('#daylabel .fecha').textContent=
    dt.toLocaleDateString('es-CR',{weekday:'short',day:'numeric',month:'short'}).replace('.','');
  document.querySelector('#daylabel .ronda').textContent=roundsToday.join(' · ');

  const box=document.getElementById('matches'); box.innerHTML='';
  RESULTADOS.filter(m=>m.d===today).forEach((m,k)=>{
    const [a,b]=teamsOf(m);
    const card=document.createElement('div');
    card.className='mcard'+(m.score?'':' pending');
    card.style.animationDelay=(k*90)+'ms';
    const fa=a?`<span class="mf ${m.score&&winnerOf(m)!==a?'loser':''}">${flagEmoji(T[a].f)}</span>`:'·';
    const fb=b?`<span class="mf ${m.score&&winnerOf(m)!==b?'loser':''}">${flagEmoji(T[b].f)}</span>`:'·';
    const na=a?T[a].n:'Por definir', nb=b?T[b].n:'Por definir';
    const mid=m.score?`<span class="sc">${m.score[0]}–${m.score[1]}</span>`:`<span class="sc">vs</span>`;
    const pn=m.pens?`<span class="pn">(${m.pens[0]}-${m.pens[1]} pen)</span>`:(m.aet?`<span class="pn">(t.e.)</span>`:'');
    card.innerHTML=`${fa}<span>${na}</span>${mid}<span>${nb}</span>${fb}${pn}`;
    box.appendChild(card);
  });

  document.getElementById('prev').disabled=dayIdx===0;
  document.getElementById('next').disabled=dayIdx===DAYS.length-1;
}

/* ---------- zoom: ajustar todo vs 100% ---------- */
let fitMode=true;
function applyZoom(){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const s=fitMode?Math.min(vw/W,vh/H):1;
  board.style.transform=`scale(${s})`;
  wrap.style.width=(W*s)+'px'; wrap.style.height=(H*s)+'px';
  // centrar el scroll en el trofeo
  viewport.scrollLeft=Math.max(0,CX*s-vw/2);
  viewport.scrollTop=Math.max(0,CY*s-vh/2);
}
document.getElementById('zoombtn').onclick=()=>{fitMode=!fitMode;applyZoom();};
window.addEventListener('resize',applyZoom);

/* ---------- controles ---------- */
let playing=null;
const playbtn=document.getElementById('playbtn');
function stop(){if(playing){clearInterval(playing);playing=null;playbtn.textContent='▶';}}
playbtn.onclick=()=>{
  if(playing){stop();return;}
  if(dayIdx>=DAYS.length-1) dayIdx=0;
  render();
  playbtn.textContent='❚❚';
  playing=setInterval(()=>{
    if(dayIdx>=DAYS.length-1){stop();return;}
    dayIdx++;render();
  },1600);
};
document.getElementById('prev').onclick=()=>{stop();if(dayIdx>0){dayIdx--;render();}};
document.getElementById('next').onclick=()=>{stop();if(dayIdx<DAYS.length-1){dayIdx++;render();}};

/* ---------- Supabase: carga y refresco automático ----------
   Poné tus credenciales y listo. Si quedan vacías, la app usa
   los datos incrustados en RESULTADOS (funciona offline igual). */
const SUPABASE_URL = '';        // ej: 'https://xxxx.supabase.co'
const SUPABASE_ANON_KEY = '';   // anon public key

async function cargarDesdeSupabase(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return false;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/partidos?select=*`,{
      headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}
    });
    if(!res.ok) return false;
    const filas=await res.json();
    let cambio=false;
    filas.forEach(f=>{
      const m=match(f.r,f.i); if(!m) return;
      const score=(f.score_a!=null)?[f.score_a,f.score_b]:undefined;
      const pens=(f.pens_a!=null)?[f.pens_a,f.pens_b]:undefined;
      if(JSON.stringify([m.a,m.b,m.score,m.pens,!!m.aet])!==
         JSON.stringify([f.a??m.a,f.b??m.b,score,pens,!!f.aet])) cambio=true;
      if(f.a) m.a=f.a; if(f.b) m.b=f.b;
      m.score=score; m.pens=pens; m.aet=!!f.aet;
    });
    if(cambio){
      lastPlayed=0;
      RESULTADOS.forEach(m=>{if(m.score)lastPlayed=Math.max(lastPlayed,DAYS.indexOf(m.d));});
      render();
    }
    return true;
  }catch(e){ return false; }
}

/* ---------- init: animación automática hasta el día actual ---------- */
applyZoom(); render();
cargarDesdeSupabase().finally(()=>{
  playbtn.textContent='❚❚';
  setTimeout(()=>{
    playing=setInterval(()=>{
      if(dayIdx>=lastPlayed){stop();return;}
      dayIdx++;render();
    },1400);
  },500);
});
setInterval(cargarDesdeSupabase, 5*60*1000);
</script>
